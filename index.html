<!DOCTYPE html>
<!--
  Poker Journal — a brain-app for BrainFoundry brains.
  Created: 2026-05-20

  Three modes:
   - Hand     paste a hand-history export -> brain proposes session +
              leak entries -> operator approves per entry.
   - Reflect  post-session prompts -> brain proposes impressions +
              leak entries -> operator approves per entry.
   - Ask      grounded chat scoped to the operator's poker corpus via
              the read-mode layers declared in brain-app.yaml.

  One self-contained file. No dependencies, no CDN, no build. Opened
  standalone (no host brain) the app shows a "no brain attached"
  message; no local proposals are fabricated and no canned answers are
  returned.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poker Journal</title>
<style>
  :root {
    --ink: #ece3d0;
    --ink-dim: #9a8f78;
    --ink-faint: #5f5743;
    --paper: #14110c;
    --paper-2: #1d1813;
    --paper-3: #241d12;
    --gold: #c9a24b;
    --gold-dim: #6f5c30;
    --line: #2c2519;
    --line-soft: #211a11;
    --red-dim: #7a3f2d;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1100px 700px at 50% -10%, #221b12 0%, var(--paper) 60%);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100%;
  }
  #frame { width: 100%; max-width: 760px; margin: 0 auto; padding: 28px 22px 80px; }
  header.app { text-align: center; margin-bottom: 22px; }
  header.app .glyph {
    font-size: 12px; letter-spacing: 0.42em; color: var(--gold);
    text-transform: lowercase;
  }
  header.app h1 {
    font-family: var(--serif); font-size: 28px; font-weight: 500;
    margin-top: 6px; letter-spacing: 0.01em;
  }
  header.app .sub { color: var(--ink-dim); font-size: 13.5px; font-style: italic; margin-top: 6px; }

  nav.modes {
    display: flex; justify-content: center; gap: 4px;
    margin: 18px 0 22px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 1px;
  }
  nav.modes button {
    background: transparent; border: 0; color: var(--ink-dim);
    font-family: var(--serif); font-size: 14px;
    padding: 9px 18px; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    letter-spacing: 0.04em;
  }
  nav.modes button:hover { color: var(--ink); }
  nav.modes button.active { color: var(--gold); border-bottom-color: var(--gold-dim); }

  textarea, input[type="text"], input[type="date"] {
    width: 100%; background: var(--paper-2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px;
    font-family: var(--mono); font-size: 13px;
    padding: 10px 12px; outline: none;
  }
  textarea { resize: vertical; min-height: 180px; line-height: 1.5; }
  textarea:focus, input:focus { border-color: var(--gold-dim); }

  label { display: block; font-size: 12px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }

  .field { margin-bottom: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row .spacer { flex: 1; }

  button.cta {
    background: var(--paper-3); color: var(--ink); border: 1px solid var(--gold-dim);
    font-family: var(--serif); font-size: 14px;
    padding: 9px 18px; cursor: pointer; border-radius: 2px;
    letter-spacing: 0.04em;
  }
  button.cta:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  button.cta:disabled { opacity: 0.4; cursor: not-allowed; }
  button.cta.small { padding: 6px 12px; font-size: 12.5px; }
  button.cta.ghost { background: transparent; border-color: var(--line); color: var(--ink-dim); }
  button.cta.ghost:hover:not(:disabled) { border-color: var(--ink-dim); color: var(--ink); }

  .panel {
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 2px; padding: 14px 16px; margin-top: 14px;
  }
  .panel.warn { border-color: var(--red-dim); }
  .panel h3 { font-size: 14px; font-weight: 500; color: var(--gold); margin-bottom: 6px; }
  .panel p { font-size: 13.5px; color: var(--ink-dim); }
  .panel .acts { margin-top: 10px; display: flex; gap: 8px; }

  .pulse { text-align: center; font-style: italic; color: var(--gold);
    margin-top: 40px; letter-spacing: 0.06em; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
  .note { text-align: center; color: var(--ink-faint); font-size: 12.5px; margin-top: 14px; }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0 12px; border-bottom: 1px solid var(--line); margin-bottom: 12px;
  }
  .toolbar .summary { font-size: 13px; color: var(--ink-dim); }
  .toolbar .acts { margin-left: auto; display: flex; gap: 8px; }

  .props { display: flex; flex-direction: column; gap: 12px; }
  .prop {
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 2px; padding: 12px 14px;
  }
  .prop.approved { border-color: var(--gold-dim); opacity: 0.85; }
  .prop.skipped { opacity: 0.4; }
  .prop .head { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .prop .head select {
    background: var(--paper-3); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px;
    font-family: var(--mono); font-size: 12px; padding: 3px 6px;
  }
  .prop .kind { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.1em; }
  .prop .conf { font-size: 11.5px; color: var(--ink-dim); margin-left: auto; }
  .prop .title { font-size: 15px; font-weight: 500; margin-top: 8px; color: var(--ink); }
  .prop .body { font-size: 13.5px; color: var(--ink-dim); margin-top: 6px; white-space: pre-wrap; }
  .prop .body.clipped { max-height: 4.5em; overflow: hidden; position: relative; }
  .prop .expand { color: var(--gold-dim); font-size: 12px; font-style: italic;
    margin-top: 4px; cursor: pointer; display: inline-block; }
  .prop .expand:hover { color: var(--ink-dim); }
  .prop .row { margin-top: 10px; }
  .prop .status { font-size: 12.5px; color: var(--gold); font-style: italic; margin-left: 4px; }
  .prop .status.err { color: #d18066; }
  .prop .status.muted { color: var(--ink-faint); }

  .chat { display: flex; flex-direction: column; gap: 12px; }
  .chat .msg { padding: 10px 12px; border: 1px solid var(--line);
    background: var(--paper-2); border-radius: 2px; font-size: 14px; }
  .chat .msg.you { border-color: var(--gold-dim); }
  .chat .msg .who { font-size: 11px; color: var(--ink-faint); text-transform: uppercase;
    letter-spacing: 0.12em; margin-bottom: 4px; }
  .chat .msg .body { white-space: pre-wrap; color: var(--ink); }
  .chat .msg .srcs { margin-top: 8px; font-size: 11.5px; color: var(--ink-faint); }
  .chat-input { display: flex; gap: 8px; margin-top: 14px; align-items: flex-end; }
  .chat-input textarea { min-height: 60px; }

  .mode-tag {
    text-align: center; margin-top: 26px; font-size: 11.5px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold-dim);
  }
</style>
</head>
<body>
<div id="frame">
  <header class="app">
    <div class="glyph">&#8463; &nbsp;poker journal</div>
    <h1>Poker Journal</h1>
    <div class="sub">paste &middot; reflect &middot; ask &mdash; your brain keeps the record</div>
  </header>

  <nav class="modes">
    <button data-mode="hand" class="active">Hand</button>
    <button data-mode="reflect">Reflect</button>
    <button data-mode="ask">Ask</button>
  </nav>

  <div id="stage"></div>
  <div id="modeTag" class="mode-tag"></div>
</div>

<script>
"use strict";

/* ----------------------------------------------------------------------
   Bridge — postMessage to the host brain shell. Standalone (window.parent
   === window) resolves every call with { ok: false, error: "standalone" }
   so the UI shows a "no brain attached" state instead of fabricating.
---------------------------------------------------------------------- */
const Bridge = (() => {
  const standalone = (window.parent === window);
  const pending = new Map();
  let seq = 0;

  window.addEventListener("message", (e) => {
    const m = e.data;
    if (!m || m.type !== "reply" || !pending.has(m.request_id)) return;
    pending.get(m.request_id).resolve(m);
    pending.delete(m.request_id);
  });

  function call(type, payload, timeoutMs) {
    if (standalone) return Promise.resolve({ ok: false, error: { code: "standalone" } });
    const request_id = "pj-" + (++seq) + "-" + Date.now();
    return new Promise((resolve) => {
      pending.set(request_id, { resolve });
      window.parent.postMessage({ type, payload, request_id }, "*");
      setTimeout(() => {
        if (pending.has(request_id)) {
          pending.delete(request_id);
          resolve({ ok: false, error: { code: "timeout" } });
        }
      }, timeoutMs || 180000);
    });
  }
  return { standalone, call };
})();

/* ---------------------------------------------------------------------- */
const stage = document.getElementById("stage");
const modeTag = document.getElementById("modeTag");
const modeButtons = document.querySelectorAll("nav.modes button");

const LAYERS = ["episodic", "semantic", "procedural"];
const KINDS_HAND = ["hand-history", "leak", "impression"];
const KINDS_REFLECT = ["impression", "leak", "insight", "open-question"];

const state = {
  mode: "hand",
  hand: { text: "", date: todayIso(), stakes: "", proposals: [] },
  reflect: {
    stakes: "", duration: "", felt_off: "", discipline: "", emotion: "",
    proposals: [],
  },
  ask: { history: [], busy: false },
};

function show(node) { stage.innerHTML = ""; stage.appendChild(node); }
function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html != null) n.innerHTML = html;
  return n;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function todayIso() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function bridgeErrorMessage(code) {
  if (code === "standalone") return "No brain is attached. Install this app into a BrainFoundry brain to use it.";
  if (code === "timeout") return "Your brain didn't answer in time.";
  return "Your brain returned an error (" + code + ").";
}

/* ---- model JSON parser shared by Hand + Reflect ---- */
function parseProposalsJson(raw) {
  if (!raw) return { ok: false };
  let s = raw.trim();
  const fence = s.match(/^```(?:json)?\s*([\s\S]*?)\s*```\s*$/i);
  if (fence) s = fence[1].trim();
  const i = s.indexOf("["), j = s.lastIndexOf("]");
  if (i >= 0 && j > i) s = s.slice(i, j + 1);
  try {
    const arr = JSON.parse(s);
    if (!Array.isArray(arr)) return { ok: false };
    return { ok: true, proposals: arr.filter((x) => x && typeof x === "object") };
  } catch (e) { return { ok: false }; }
}

/* ----------------------------------------------------------------------
   Mode switcher
---------------------------------------------------------------------- */
modeButtons.forEach((b) => {
  b.onclick = () => {
    state.mode = b.dataset.mode;
    modeButtons.forEach((x) => x.classList.toggle("active", x === b));
    render();
  };
});

function render() {
  if (state.mode === "hand") {
    if (state.hand.proposals.length) viewProposals("hand");
    else viewHand();
  } else if (state.mode === "reflect") {
    if (state.reflect.proposals.length) viewProposals("reflect");
    else viewReflect();
  } else {
    viewAsk();
  }
}

/* ----------------------------------------------------------------------
   HAND — paste hand-history text, brain proposes session + leaks.
---------------------------------------------------------------------- */
function viewHand() {
  modeTag.textContent = Bridge.standalone
    ? "standalone &middot; no brain attached"
    : "hand &middot; paste a hand-history export";

  const v = el("div");

  const field1 = el("div", "field");
  field1.appendChild(el("label", null, "Hand history (paste raw)"));
  const ta = el("textarea");
  ta.placeholder = "Paste a PokerStars (or similar) hand-history text export. Any plain-text hand history works.";
  ta.value = state.hand.text;
  field1.appendChild(ta);
  v.appendChild(field1);

  const row = el("div", "row");

  const dateField = el("div");
  dateField.style.minWidth = "150px";
  dateField.appendChild(el("label", null, "Date"));
  const di = document.createElement("input");
  di.type = "date"; di.value = state.hand.date;
  dateField.appendChild(di);
  row.appendChild(dateField);

  const stakesField = el("div");
  stakesField.style.flex = "1"; stakesField.style.minWidth = "180px";
  stakesField.appendChild(el("label", null, "Stakes / format (optional)"));
  const si = document.createElement("input");
  si.type = "text"; si.placeholder = "e.g. NL2, 6-max"; si.value = state.hand.stakes;
  stakesField.appendChild(si);
  row.appendChild(stakesField);

  row.appendChild(el("div", "spacer"));

  const btn = el("button", "cta", "Read this");
  btn.disabled = true;
  row.appendChild(btn);

  v.appendChild(row);

  if (Bridge.standalone) {
    const w = el("div", "panel warn");
    w.appendChild(el("h3", null, "No brain attached"));
    w.appendChild(el("p", null,
      "This app talks to a brain through the host shell. Install it into a BrainFoundry brain to use it. Standalone, nothing is proposed &mdash; the app does not fabricate."));
    v.appendChild(w);
  }

  function update() {
    state.hand.text = ta.value;
    state.hand.date = di.value || todayIso();
    state.hand.stakes = si.value;
    btn.disabled = !ta.value.trim() || Bridge.standalone;
  }
  ta.addEventListener("input", update);
  di.addEventListener("change", update);
  si.addEventListener("input", update);
  update();

  btn.onclick = async () => {
    btn.disabled = true;
    modeTag.textContent = "hand &middot; reading &mdash; classifying the hand";
    show(el("div", "pulse", "Reading"));

    const r = await proposeFromHand();
    if (!r.ok) { viewError(r); return; }
    state.hand.proposals = normalizeProposals(r.proposals, KINDS_HAND, "episodic");
    viewProposals("hand");
  };

  show(v);
  setTimeout(() => ta.focus(), 40);
}

async function proposeFromHand() {
  const system =
    "You are this person's own brain. They have pasted a poker hand-history export (commonly from PokerStars, but any plain-text format is possible). Extract DURABLE MEMORY ENTRIES they would have written by hand after the session.\n\n" +
    "OUTPUT: strict JSON. A single array, nothing else. No prose, no preface, no code fences. Each element:\n" +
    "  { \"layer\": \"episodic\" | \"semantic\" | \"procedural\",\n" +
    "    \"title\": string (one line, <= 90 chars),\n" +
    "    \"content\": string (the body of the memory in the operator's voice, markdown allowed),\n" +
    "    \"kind\": \"hand-history\" | \"leak\" | \"impression\",\n" +
    "    \"confidence\": number 0..1 }\n\n" +
    "RULES:\n" +
    "- Produce exactly ONE entry of kind 'hand-history' (layer: episodic) summarising the session: platform, stakes, format, table, duration if available, hand count if available, and a concise account of notable hands. Do not exhaustively replay every hand &mdash; the raw export is the source of truth.\n" +
    "- Produce 0..N entries of kind 'leak' (layer: procedural) ONLY when a structural / cognitive / emotional pattern of error or discipline-slip is genuinely observable in the action sequence. Each leak: short title, one-paragraph description with cited example.\n" +
    "- Produce 0..N entries of kind 'impression' (layer: episodic) ONLY when the operator-provided notes (stakes/format hint or any prose in the paste) contain first-person testimony. Do not invent first-person testimony.\n" +
    "- NEVER FABRICATE. Only extract what is supported by the pasted text. Empty array [] is acceptable.\n" +
    "- Do NOT include the date in the title or content &mdash; it is attached separately as metadata.\n";

  const userMsg =
    "Session date (metadata only, do not echo): " + state.hand.date + "\n" +
    (state.hand.stakes ? "Operator-provided stakes/format hint: " + state.hand.stakes + "\n" : "") +
    "\n=== BEGIN HAND HISTORY ===\n" + state.hand.text + "\n=== END HAND HISTORY ===\n\n" +
    "Return the JSON array of proposed memory entries now.";

  return await callForProposals(system, userMsg);
}

/* ----------------------------------------------------------------------
   REFLECT — guided prompts, brain proposes impressions + leaks.
---------------------------------------------------------------------- */
function viewReflect() {
  modeTag.textContent = Bridge.standalone
    ? "standalone &middot; no brain attached"
    : "reflect &middot; write briefly &mdash; your brain synthesises";

  const v = el("div");

  function fld(labelText, key, placeholder, multi) {
    const f = el("div", "field");
    f.appendChild(el("label", null, labelText));
    const input = multi ? document.createElement("textarea") : document.createElement("input");
    if (!multi) input.type = "text";
    input.placeholder = placeholder;
    input.value = state.reflect[key];
    if (multi) input.style.minHeight = "70px";
    input.addEventListener("input", () => { state.reflect[key] = input.value; update(); });
    f.appendChild(input);
    v.appendChild(f);
    return input;
  }

  const i1 = fld("Stakes / format", "stakes", "e.g. NL2, 6-max", false);
  const i2 = fld("Duration / hand count (rough)", "duration", "e.g. ~2 hours, ~180 hands", false);
  const i3 = fld("What spots felt off?", "felt_off", "First thing that comes &mdash; one or two spots. No analysis.", true);
  const i4 = fld("Where did discipline slip?", "discipline", "Calls without read, autopilot, results-based thinking, tilt&hellip;", true);
  const i5 = fld("Dominant emotion at the table?", "emotion", "One sentence is enough.", true);

  const row = el("div", "row");
  row.appendChild(el("div", "spacer"));
  const btn = el("button", "cta", "Read this");
  btn.disabled = true;
  row.appendChild(btn);
  v.appendChild(row);

  if (Bridge.standalone) {
    const w = el("div", "panel warn");
    w.appendChild(el("h3", null, "No brain attached"));
    w.appendChild(el("p", null, "Install this app into a BrainFoundry brain to use it."));
    v.appendChild(w);
  }

  function update() {
    const r = state.reflect;
    const any = (r.felt_off || r.discipline || r.emotion).trim().length > 0;
    btn.disabled = !any || Bridge.standalone;
  }
  update();

  btn.onclick = async () => {
    btn.disabled = true;
    modeTag.textContent = "reflect &middot; reading &mdash; synthesising entries";
    show(el("div", "pulse", "Reading"));

    const r = await proposeFromReflect();
    if (!r.ok) { viewError(r); return; }
    state.reflect.proposals = normalizeProposals(r.proposals, KINDS_REFLECT, "episodic");
    viewProposals("reflect");
  };

  show(v);
  setTimeout(() => i3.focus(), 40);
}

async function proposeFromReflect() {
  const system =
    "You are this person's own brain. They have written a short post-session reflection on a poker session. Extract DURABLE MEMORY ENTRIES they would have written by hand: impressions (first-person testimony) and leaks (named structural / cognitive / emotional patterns).\n\n" +
    "OUTPUT: strict JSON. A single array, nothing else. No prose, no preface, no code fences. Each element:\n" +
    "  { \"layer\": \"episodic\" | \"semantic\" | \"procedural\",\n" +
    "    \"title\": string (<= 90 chars),\n" +
    "    \"content\": string (operator's voice, markdown allowed),\n" +
    "    \"kind\": \"impression\" | \"leak\" | \"insight\" | \"open-question\",\n" +
    "    \"confidence\": number 0..1 }\n\n" +
    "RULES:\n" +
    "- 'impression' (episodic): preserve the operator's first-person testimony almost verbatim &mdash; minor cleanup only. Do not interpret or explain.\n" +
    "- 'leak' (procedural): only if a genuine pattern is named (not just a feeling). Each leak gets a short structural title and one-paragraph description.\n" +
    "- 'insight' (semantic): only for a stated realization that survives this session.\n" +
    "- 'open-question' (semantic): only if the operator left something genuinely unresolved.\n" +
    "- NEVER FABRICATE. If a field is empty, do not invent material for it.\n" +
    "- Prefer fewer, denser entries.\n";

  const r = state.reflect;
  const userMsg =
    "Stakes / format: " + (r.stakes || "(not given)") + "\n" +
    "Duration / hand count: " + (r.duration || "(not given)") + "\n\n" +
    "WHAT SPOTS FELT OFF:\n" + (r.felt_off || "(not given)") + "\n\n" +
    "WHERE DISCIPLINE SLIPPED:\n" + (r.discipline || "(not given)") + "\n\n" +
    "DOMINANT EMOTION:\n" + (r.emotion || "(not given)") + "\n\n" +
    "Return the JSON array of proposed memory entries now.";

  return await callForProposals(system, userMsg);
}

/* ----------------------------------------------------------------------
   ASK — grounded chat scoped to the operator's poker corpus.
---------------------------------------------------------------------- */
function viewAsk() {
  modeTag.textContent = Bridge.standalone
    ? "standalone &middot; no brain attached"
    : "ask &middot; grounded in your poker corpus";

  const v = el("div");

  const chat = el("div", "chat");
  for (const m of state.ask.history) chat.appendChild(renderMsg(m));
  if (state.ask.history.length === 0) {
    const p = el("div", "panel");
    p.appendChild(el("h3", null, "Ask your brain about your poker"));
    p.appendChild(el("p", null,
      "Questions are answered against your own corpus: hand histories, leaks, impressions, framework documents you have ingested. The brain cites the sources it grounds on."));
    v.appendChild(p);
  }
  v.appendChild(chat);

  const inputWrap = el("div", "chat-input");
  const ta = document.createElement("textarea");
  ta.placeholder = "Ask &mdash; e.g. 'what are my active leaks?', 'summarise my voice charter', 'where did I misplay in the March 16 session?'";
  ta.style.flex = "1";
  inputWrap.appendChild(ta);
  const btn = el("button", "cta", "Send");
  btn.disabled = true;
  inputWrap.appendChild(btn);
  v.appendChild(inputWrap);

  if (Bridge.standalone) {
    const w = el("div", "panel warn");
    w.appendChild(el("h3", null, "No brain attached"));
    w.appendChild(el("p", null, "Install this app into a BrainFoundry brain to use it."));
    v.appendChild(w);
  }

  function update() {
    btn.disabled = !ta.value.trim() || Bridge.standalone || state.ask.busy;
  }
  ta.addEventListener("input", update);
  ta.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); btn.click(); }
  });
  update();

  btn.onclick = async () => {
    const q = ta.value.trim();
    if (!q) return;
    state.ask.history.push({ who: "you", body: q });
    ta.value = ""; state.ask.busy = true; update();
    chat.appendChild(renderMsg(state.ask.history[state.ask.history.length - 1]));

    const thinking = { who: "brain", body: "thinking…", thinking: true };
    state.ask.history.push(thinking);
    const thinkingEl = renderMsg(thinking);
    chat.appendChild(thinkingEl);

    const messages = state.ask.history
      .filter((m) => !m.thinking)
      .map((m) => ({ role: m.who === "you" ? "user" : "assistant", content: m.body }));

    const res = await Bridge.call("llm.complete", { messages }, 180000);
    state.ask.history.pop();
    thinkingEl.remove();

    if (!res || !res.ok) {
      const code = (res && res.error && res.error.code) || "unknown";
      const msg = { who: "brain", body: bridgeErrorMessage(code), err: true };
      state.ask.history.push(msg);
      chat.appendChild(renderMsg(msg));
    } else {
      const r = res.result || {};
      const msg = {
        who: "brain",
        body: r.text || "(empty reply)",
        sources: Array.isArray(r.sources) ? r.sources : [],
        model: r.model || null,
      };
      state.ask.history.push(msg);
      chat.appendChild(renderMsg(msg));
    }

    state.ask.busy = false; update();
    setTimeout(() => ta.focus(), 30);
  };

  show(v);
  setTimeout(() => ta.focus(), 40);
}

function renderMsg(m) {
  const n = el("div", "msg " + (m.who === "you" ? "you" : ""));
  n.appendChild(el("div", "who", m.who === "you" ? "you" : "your brain"));
  const body = el("div", "body");
  body.textContent = m.body;
  if (m.err) body.style.color = "#d18066";
  if (m.thinking) body.style.fontStyle = "italic";
  n.appendChild(body);
  if (m.sources && m.sources.length) {
    const s = el("div", "srcs");
    s.textContent = "sources: " + m.sources.map((x) =>
      typeof x === "string" ? x : (x.document_name || x.title || "?")).join(" · ");
    n.appendChild(s);
  }
  return n;
}

/* ----------------------------------------------------------------------
   Shared: call brain for JSON proposals, parse, return.
---------------------------------------------------------------------- */
async function callForProposals(system, userMsg) {
  const res = await Bridge.call("llm.complete", {
    messages: [
      { role: "system", content: system },
      { role: "user", content: userMsg },
    ],
  }, 240000);
  if (!res || !res.ok) {
    const code = (res && res.error && res.error.code) || "unknown";
    return { ok: false, code, message: bridgeErrorMessage(code) };
  }
  const raw = (res.result && res.result.text) || "";
  const parsed = parseProposalsJson(raw);
  if (!parsed.ok) {
    return { ok: false, code: "parse",
      message: "Your brain returned something I couldn't parse as JSON. First 240 chars: " + (raw.slice(0, 240) || "(empty)") };
  }
  return { ok: true, proposals: parsed.proposals };
}

function normalizeProposals(raw, allowedKinds, defaultLayer) {
  const out = raw.map((p, i) => ({
    id: "p" + i + "-" + Date.now(),
    layer: LAYERS.includes(p.layer) ? p.layer : defaultLayer,
    kind: allowedKinds.includes(p.kind) ? p.kind : allowedKinds[0],
    title: p.title || "(untitled)",
    content: p.content || "",
    confidence: typeof p.confidence === "number" ? p.confidence : null,
    status: "pending",
    error: null, saved_id: null, expanded: false,
  }));
  out.sort((a, b) => {
    const ac = a.confidence == null ? -1 : a.confidence;
    const bc = b.confidence == null ? -1 : b.confidence;
    return bc - ac;
  });
  return out;
}

/* ----------------------------------------------------------------------
   Proposals view — shared between Hand and Reflect.
---------------------------------------------------------------------- */
function viewProposals(mode) {
  const proposals = state[mode].proposals;
  if (!proposals.length) {
    const v = el("div");
    const p = el("div", "panel");
    p.appendChild(el("h3", null, "Nothing worth keeping"));
    p.appendChild(el("p", null,
      mode === "hand"
        ? "Your brain read the hand history and proposed zero durable entries. Either the export was too thin, or nothing structural surfaced."
        : "Your brain read the reflection and proposed zero durable entries."));
    const acts = el("div", "acts");
    const back = el("button", "cta", "Start over");
    back.onclick = () => { state[mode].proposals = []; render(); };
    acts.appendChild(back);
    p.appendChild(acts);
    v.appendChild(p);
    show(v);
    return;
  }

  modeTag.textContent = mode + " &middot; proposals &mdash; review and approve";
  const v = el("div");

  const tb = el("div", "toolbar");
  const summary = el("div", "summary");
  tb.appendChild(summary);
  const acts = el("div", "acts");
  const approveAll = el("button", "cta small", "Approve all");
  approveAll.onclick = () => approveAllPending(mode);
  acts.appendChild(approveAll);
  const back = el("button", "cta ghost small", "Start over");
  back.onclick = () => { state[mode].proposals = []; render(); };
  acts.appendChild(back);
  tb.appendChild(acts);
  v.appendChild(tb);

  const list = el("div", "props");
  v.appendChild(list);
  for (const p of proposals) list.appendChild(propCard(p, mode));

  show(v);
  refreshSummary();

  function refreshSummary() {
    const total = proposals.length;
    const approved = proposals.filter((p) => p.status === "approved").length;
    const skipped = proposals.filter((p) => p.status === "skipped").length;
    const remaining = total - approved - skipped;
    summary.innerHTML =
      "<b>" + total + "</b> proposed &nbsp;&middot;&nbsp; " +
      "<b>" + approved + "</b> kept &nbsp;&middot;&nbsp; " +
      "<b>" + skipped + "</b> skipped &nbsp;&middot;&nbsp; " +
      "<b>" + remaining + "</b> left";
    approveAll.disabled = (remaining === 0);
  }
  state._refreshSummary = refreshSummary;
}

function propCard(p, mode) {
  const card = el("div", "prop");
  card.dataset.id = p.id;
  if (p.status === "approved") card.classList.add("approved");
  if (p.status === "skipped") card.classList.add("skipped");

  const head = el("div", "head");
  const layerSel = document.createElement("select");
  for (const L of LAYERS) {
    const o = document.createElement("option");
    o.value = L; o.textContent = L;
    if (L === p.layer) o.selected = true;
    layerSel.appendChild(o);
  }
  layerSel.onchange = () => { p.layer = layerSel.value; };
  head.appendChild(layerSel);

  head.appendChild(el("div", "kind", escapeHtml(p.kind)));
  if (p.confidence != null) {
    const c = el("div", "conf");
    c.innerHTML = "confidence <b>" + (p.confidence * 100).toFixed(0) + "%</b>";
    head.appendChild(c);
  }
  card.appendChild(head);

  card.appendChild(el("div", "title", escapeHtml(p.title)));
  const body = el("div", "body" + (p.expanded ? "" : " clipped"), escapeHtml(p.content));
  card.appendChild(body);
  if (p.content && p.content.length > 240) {
    const ex = el("span", "expand", p.expanded ? "Collapse" : "Expand");
    ex.onclick = () => {
      p.expanded = !p.expanded;
      body.classList.toggle("clipped", !p.expanded);
      ex.textContent = p.expanded ? "Collapse" : "Expand";
    };
    card.appendChild(ex);
  }

  const row = el("div", "row");
  const approve = el("button", "cta small", "Approve");
  const skip = el("button", "cta ghost small", "Skip");
  const status = el("div", "status muted", "");

  approve.onclick = async () => {
    if (p.status === "approved" || p.status === "approving") return;
    p.status = "approving";
    approve.disabled = true; skip.disabled = true; layerSel.disabled = true;
    status.className = "status"; status.textContent = "writing to your brain…";
    const r = await writeProposal(p, mode);
    if (r.ok) {
      p.status = "approved"; p.saved_id = r.id;
      card.classList.add("approved");
      status.textContent = "kept in " + p.layer + " memory";
      approve.remove(); skip.remove();
    } else {
      p.status = "error"; p.error = r.message;
      status.className = "status err"; status.textContent = r.message;
      approve.disabled = false; skip.disabled = false; layerSel.disabled = false;
    }
    if (state._refreshSummary) state._refreshSummary();
  };
  skip.onclick = () => {
    if (p.status === "approved") return;
    p.status = "skipped";
    card.classList.add("skipped");
    approve.remove(); skip.remove();
    layerSel.disabled = true;
    status.className = "status muted"; status.textContent = "skipped";
    if (state._refreshSummary) state._refreshSummary();
  };

  if (p.status === "approved") { status.className = "status"; status.textContent = "kept in " + p.layer + " memory"; }
  else if (p.status === "skipped") { status.className = "status muted"; status.textContent = "skipped"; layerSel.disabled = true; }
  else { row.appendChild(approve); row.appendChild(skip); }
  row.appendChild(status);
  card.appendChild(row);
  return card;
}

async function writeProposal(p, mode) {
  const content = p.title.trim() ? ("# " + p.title.trim() + "\n\n" + (p.content || "")) : (p.content || "");
  const metadata = {
    kind: p.kind,
    app: "poker-journal",
    mode,
    confidence: p.confidence,
    title: p.title,
    created: new Date().toISOString(),
  };
  if (mode === "hand") {
    metadata.session_date = state.hand.date;
    if (state.hand.stakes) metadata.stakes = state.hand.stakes;
  }
  const res = await Bridge.call("memory.write", {
    layer: p.layer, content, source: "poker-journal", metadata,
  }, 30000);
  if (res && res.ok && res.result) return { ok: true, id: res.result.id || null };
  const code = (res && res.error && res.error.code) || "unknown";
  let msg = "couldn't save (" + code + ")";
  if (code === "timeout") msg = "your brain didn't answer in time";
  if (code === "standalone") msg = "no brain attached";
  return { ok: false, message: msg };
}

async function approveAllPending(mode) {
  for (const p of state[mode].proposals) {
    if (p.status !== "pending" && p.status !== "error") continue;
    const card = stage.querySelector('[data-id="' + p.id + '"]');
    if (!card) continue;
    const btn = card.querySelector(".cta:not(.ghost)");
    if (btn) {
      btn.click();
      await waitFor(() => p.status !== "approving", 30000);
    }
  }
}
function waitFor(fn, timeoutMs) {
  return new Promise((resolve) => {
    const t0 = Date.now();
    const tick = () => { if (fn() || Date.now() - t0 > timeoutMs) return resolve(); setTimeout(tick, 60); };
    tick();
  });
}

function viewError(result) {
  modeTag.textContent = state.mode + " &middot; error &mdash; reading failed";
  const v = el("div");
  const p = el("div", "panel warn");
  p.appendChild(el("h3", null, "Reading failed"));
  p.appendChild(el("p", null, escapeHtml(result.message)));
  const acts = el("div", "acts");
  const back = el("button", "cta", "Back");
  back.onclick = () => render();
  acts.appendChild(back);
  p.appendChild(acts);
  v.appendChild(p);
  show(v);
}

/* ---- boot ---- */
render();
</script>
</body>
</html>
