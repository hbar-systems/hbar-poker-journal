<!DOCTYPE html>
<!--
  Poker Journal — a brain-app for BrainFoundry brains.
  Created: 2026-05-20. v0.3 visual identity: matched to the hbar.poker
  site (cream paper, system sans, mono for data, restrained tabs).
  Museum-vitrine, not wisdom-shrine.

  Four modes:
   - Hand     paste a hand-history export -> brain proposes session +
              leak entries -> operator approves per entry.
   - Reflect  post-session prompts -> brain proposes impressions +
              leak entries -> operator approves per entry.
   - Ask      grounded chat scoped to the operator's poker corpus.
   - Theory   click a poker concept; brain explains it, grounded;
              Keep this saves notable explanations.

  One self-contained file. No dependencies, no CDN, no build. Opened
  standalone (no host brain) the app shows a "no brain attached"
  message; no local proposals are fabricated.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poker Journal</title>
<style>
  :root {
    /* Palette lifted from hbar.poker/styles.css */
    --paper:        #f7f6f4;
    --paper-2:      #fbfaf8;
    --paper-3:      #efeee9;
    --paper-white:  #fffffe;
    --ink-dark:     #1a1a1a;
    --ink:          #2b2b2b;
    --ink-med:      #3a3a3a;
    --ink-dim:      #5a5a5a;
    --ink-soft:     #7a7a7a;
    --ink-faint:    #9a9a9a;
    --ink-faintest: #bbb;
    --line:         #d4d0c8;
    --line-soft:    #e8e5df;
    --line-dashed:  #c9c5bd;
    --notice-bg:     #fef9ed;
    --notice-border: #e8dcc4;
    --notice-text:   #7a6a4a;
    --err-bg:        #fdf0ee;
    --err-border:    #e8c4bc;
    --err-text:      #8a4a3a;
    --ok-bg:         #f4faf5;
    --ok-border:     #c4dcc8;
    --ok-text:       #4a7a5a;
    --link:          #6b7fa8;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica', 'Arial', sans-serif;
    --mono: 'Courier New', 'Courier', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink);
    background: var(--paper);
    min-height: 100%;
  }
  #frame {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  header {
    margin-bottom: 2.5rem;
  }
  header h1 {
    font-size: 1.75rem;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink-dark);
    margin-bottom: 0.35rem;
  }
  header .subtitle {
    font-size: 0.95rem;
    color: var(--ink-dim);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  header .intent {
    font-size: 0.9rem;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.5;
  }
  header .classification {
    font-size: 0.85rem;
    color: var(--ink-soft);
    line-height: 1.5;
    margin-top: 0.5rem;
  }

  /* Modes nav — mirrors .tabs from the site exactly. */
  nav.modes {
    display: flex;
    gap: 1.25rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 2.5rem;
    padding-bottom: 0.05rem;
  }
  nav.modes button {
    background: none;
    border: 0;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    padding: 0.35rem 0 0.55rem;
    font-family: var(--sans);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    cursor: pointer;
    transition: color 0.12s ease, border-color 0.12s ease;
  }
  nav.modes button:hover { color: var(--ink-med); }
  nav.modes button.active {
    color: var(--ink-dark);
    border-bottom-color: var(--ink);
  }

  /* Section headings (h3 inside panels) — mirrors h2 from the site. */
  h2, h3 {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    margin-bottom: 0.6rem;
  }

  /* Inputs */
  textarea, input[type="text"], input[type="date"], select {
    width: 100%;
    background: var(--paper-white);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 3px;
    font-family: var(--sans);
    font-size: 0.92rem;
    padding: 0.55rem 0.75rem;
    outline: none;
    line-height: 1.55;
  }
  textarea {
    resize: vertical;
    min-height: 140px;
  }
  textarea:focus, input:focus, select:focus {
    border-color: var(--ink-faint);
  }
  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-faint);
    margin-bottom: 0.4rem;
  }

  .field { margin-bottom: 1.1rem; }
  .row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .row .spacer { flex: 1; }

  /* Buttons — restrained, sober. */
  button.cta {
    background: var(--paper-2);
    color: var(--ink-dark);
    border: 1px solid var(--line);
    font-family: var(--sans);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.5rem 1.1rem;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }
  button.cta:hover:not(:disabled) {
    background: var(--paper-3);
    border-color: var(--ink-faint);
  }
  button.cta:disabled { opacity: 0.4; cursor: not-allowed; }
  button.cta.small { padding: 0.32rem 0.75rem; font-size: 0.72rem; }
  button.cta.ghost {
    background: transparent;
    border-color: transparent;
    color: var(--ink-faint);
  }
  button.cta.ghost:hover:not(:disabled) {
    background: var(--paper-3);
    border-color: var(--line);
    color: var(--ink);
  }

  /* Panels — for empty-states, warnings, "no brain attached" etc. */
  .panel {
    background: var(--paper-2);
    border: 1px solid var(--line-soft);
    border-radius: 3px;
    padding: 1rem 1.15rem;
    margin-top: 1rem;
  }
  .panel.warn {
    background: var(--err-bg);
    border-color: var(--err-border);
  }
  .panel.warn h3 { color: var(--err-text); }
  .panel p {
    font-size: 0.88rem;
    color: var(--ink-soft);
    line-height: 1.65;
  }
  .panel.warn p { color: var(--err-text); }
  .panel .acts { margin-top: 0.85rem; display: flex; gap: 0.5rem; }

  .pulse {
    text-align: center;
    font-style: italic;
    color: var(--ink-soft);
    margin-top: 2.5rem;
    letter-spacing: 0.06em;
    font-size: 0.9rem;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
  .note {
    text-align: center;
    color: var(--ink-faintest);
    font-size: 0.85rem;
    margin-top: 1rem;
  }

  /* Toolbar above proposal lists */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.4rem 0 0.85rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 1rem;
  }
  .toolbar .summary { font-size: 0.85rem; color: var(--ink-soft); }
  .toolbar .acts { margin-left: auto; display: flex; gap: 0.5rem; }

  /* Proposal cards (Hand / Reflect output) */
  .props { display: flex; flex-direction: column; gap: 0.85rem; }
  .prop {
    background: var(--paper-2);
    border: 1px solid var(--line-soft);
    border-radius: 3px;
    padding: 0.85rem 1rem;
  }
  .prop.approved {
    background: var(--ok-bg);
    border-color: var(--ok-border);
  }
  .prop.skipped { opacity: 0.45; }
  .prop .head {
    display: flex;
    gap: 0.7rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .prop .head select {
    width: auto;
    background: var(--paper-white);
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.2rem 0.5rem;
  }
  .prop .kind {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .prop .conf {
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-left: auto;
    font-family: var(--mono);
  }
  .prop .title {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink-dark);
    margin-bottom: 0.3rem;
    line-height: 1.4;
  }
  .prop .body {
    font-size: 0.88rem;
    color: var(--ink-med);
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .prop .body.clipped {
    max-height: 4.5em;
    overflow: hidden;
    position: relative;
  }
  .prop .expand {
    color: var(--link);
    font-size: 0.78rem;
    font-style: italic;
    margin-top: 0.35rem;
    cursor: pointer;
    display: inline-block;
  }
  .prop .expand:hover { text-decoration: underline; }
  .prop .row { margin-top: 0.7rem; }
  .prop .status { font-size: 0.78rem; color: var(--ok-text); font-style: italic; }
  .prop .status.err { color: var(--err-text); }
  .prop .status.muted { color: var(--ink-faintest); }

  /* Chat — Ask and Theory both use this */
  .chat { display: flex; flex-direction: column; gap: 0.85rem; }
  .chat .msg {
    padding: 0.8rem 1rem;
    border: 1px solid var(--line-soft);
    background: var(--paper-2);
    border-radius: 3px;
    font-size: 0.92rem;
  }
  .chat .msg.you {
    background: var(--paper-3);
    border-color: var(--line);
  }
  .chat .msg .who {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--ink-faintest);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.35rem;
  }
  .chat .msg .body {
    white-space: pre-wrap;
    color: var(--ink);
    line-height: 1.7;
  }
  .chat .msg .srcs {
    margin-top: 0.6rem;
    font-size: 0.75rem;
    color: var(--ink-faintest);
    font-family: var(--mono);
  }
  .chat-input {
    display: flex;
    gap: 0.55rem;
    margin-top: 1rem;
    align-items: flex-end;
  }
  .chat-input textarea { min-height: 4rem; }
  .msg .keep-bar {
    margin-top: 0.55rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .msg .keep-bar button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-faint);
    font-family: var(--sans);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.25rem 0.65rem;
    cursor: pointer;
    border-radius: 3px;
    transition: color 0.12s ease, border-color 0.12s ease;
  }
  .msg .keep-bar button:hover:not(:disabled) {
    color: var(--ink-dark);
    border-color: var(--ink-faint);
  }
  .msg .keep-bar button:disabled { opacity: 0.45; cursor: not-allowed; }
  .msg .keep-bar .kept {
    font-size: 0.75rem;
    color: var(--ok-text);
    font-style: italic;
  }

  .keep-card {
    margin-top: 0.55rem;
    padding: 0.85rem 1rem;
    background: var(--notice-bg);
    border: 1px solid var(--notice-border);
    border-radius: 3px;
  }
  .keep-card label {
    margin-top: 0.55rem;
    color: var(--notice-text);
  }
  .keep-card label:first-child { margin-top: 0; }
  .keep-card .row { margin-top: 0.9rem; }
  .keep-card input, .keep-card textarea, .keep-card select {
    background: var(--paper-white);
    border-color: var(--notice-border);
  }
  .keep-card input:focus, .keep-card textarea:focus, .keep-card select:focus {
    border-color: var(--notice-text);
  }

  /* Theory chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.25rem;
  }
  .chip {
    background: var(--paper-2);
    border: 1px solid var(--line);
    color: var(--ink-med);
    font-family: var(--sans);
    font-size: 0.78rem;
    padding: 0.3rem 0.75rem;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .chip:hover:not(:disabled) {
    background: var(--paper-3);
    color: var(--ink-dark);
    border-color: var(--ink-faint);
  }
  .chip:disabled { opacity: 0.4; cursor: not-allowed; }
  .chip.busy {
    background: var(--notice-bg);
    color: var(--notice-text);
    border-color: var(--notice-border);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .mode-tag {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-faintest);
  }

  /* Footer-style version pin (echoes the site's .footer-version) */
  .version-pin {
    text-align: center;
    margin-top: 0.4rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--ink-faintest);
    letter-spacing: 0.03em;
  }

  @media (max-width: 600px) {
    body { font-size: 16px; }
    #frame { padding: 1.75rem 1.1rem 3rem; }
    header h1 { font-size: 1.4rem; }
    nav.modes { gap: 0.85rem; }
  }
</style>
</head>
<body>
<div id="frame">
  <header>
    <h1>Poker Journal</h1>
    <p class="subtitle">A brain-app for keeping a field journal where the rest of your thinking lives.</p>
    <p class="intent">Paste hands, reflect, ask, study concepts. Your brain keeps the record.</p>
    <p class="classification">Brain-app &middot; part of hbar.poker.</p>
  </header>

  <nav class="modes">
    <button data-mode="hand" class="active">Hand</button>
    <button data-mode="reflect">Reflect</button>
    <button data-mode="ask">Ask</button>
    <button data-mode="theory">Theory</button>
  </nav>

  <div id="stage"></div>
  <div id="modeTag" class="mode-tag"></div>
  <div class="version-pin">poker-journal &middot; v0.3.0</div>
</div>

<script>
"use strict";

/* ----------------------------------------------------------------------
   Bridge — postMessage to the host brain shell. Standalone (window.parent
   === window) resolves every call with { ok: false, error: "standalone" }
   so the UI shows a "no brain attached" state instead of fabricating.
---------------------------------------------------------------------- */
const Bridge = (() => {
  const standalone = (window.parent === window);
  const pending = new Map();
  let seq = 0;

  window.addEventListener("message", (e) => {
    const m = e.data;
    if (!m || m.type !== "reply" || !pending.has(m.request_id)) return;
    pending.get(m.request_id).resolve(m);
    pending.delete(m.request_id);
  });

  function call(type, payload, timeoutMs) {
    if (standalone) return Promise.resolve({ ok: false, error: { code: "standalone" } });
    const request_id = "pj-" + (++seq) + "-" + Date.now();
    return new Promise((resolve) => {
      pending.set(request_id, { resolve });
      window.parent.postMessage({ type, payload, request_id }, "*");
      setTimeout(() => {
        if (pending.has(request_id)) {
          pending.delete(request_id);
          resolve({ ok: false, error: { code: "timeout" } });
        }
      }, timeoutMs || 180000);
    });
  }
  return { standalone, call };
})();

/* ---------------------------------------------------------------------- */
const stage = document.getElementById("stage");
const modeTag = document.getElementById("modeTag");
const modeButtons = document.querySelectorAll("nav.modes button");

const LAYERS = ["episodic", "semantic", "procedural"];
const KINDS_HAND = ["hand-history", "leak", "impression"];
const KINDS_REFLECT = ["impression", "leak", "insight", "open-question"];
const KINDS_KEEP = ["concept-explainer", "insight", "note", "snippet"];

/* Theory concept list. Hardcoded so the app ships generically; any
   installer benefits. The brain provides the explanation, grounded in
   whatever theory material the operator has ingested (or general
   knowledge if none). */
const THEORY_CONCEPTS = [
  { id: "pot-odds",              label: "Pot odds" },
  { id: "equity-realization",    label: "Equity vs equity realization" },
  { id: "position",              label: "Position (in / out of)" },
  { id: "range-vs-hand",         label: "Range vs hand" },
  { id: "polarised-merged",      label: "Polarised vs merged ranges" },
  { id: "mixed-strategy",        label: "Mixed strategy" },
  { id: "nash-equilibrium",      label: "Nash equilibrium" },
  { id: "gto-exploit",           label: "GTO vs exploitative" },
  { id: "cbet-frequency",        label: "C-bet frequency" },
  { id: "bluff-frequency",       label: "Bluff frequency" },
  { id: "variance-decision",     label: "Variance vs decision quality" },
  { id: "ergodicity",            label: "Ergodicity / sample size" },
  { id: "icm",                   label: "ICM (Independent Chip Model)" },
  { id: "partial-observability", label: "Information asymmetry" },
];

const state = {
  mode: "hand",
  hand: { text: "", date: todayIso(), stakes: "", proposals: [] },
  reflect: {
    stakes: "", duration: "", felt_off: "", discipline: "", emotion: "",
    proposals: [],
  },
  ask: { history: [], busy: false },
  theory: { history: [], busy: false },
};

function show(node) { stage.innerHTML = ""; stage.appendChild(node); }
function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html != null) n.innerHTML = html;
  return n;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function todayIso() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function bridgeErrorMessage(code) {
  if (code === "standalone") return "No brain is attached. Install this app into a BrainFoundry brain to use it.";
  if (code === "timeout") return "Your brain didn't answer in time.";
  return "Your brain returned an error (" + code + ").";
}

/* ---- model JSON parser shared by Hand + Reflect ---- */
function parseProposalsJson(raw) {
  if (!raw) return { ok: false };
  let s = raw.trim();
  const fence = s.match(/^```(?:json)?\s*([\s\S]*?)\s*```\s*$/i);
  if (fence) s = fence[1].trim();
  const i = s.indexOf("["), j = s.lastIndexOf("]");
  if (i >= 0 && j > i) s = s.slice(i, j + 1);
  try {
    const arr = JSON.parse(s);
    if (!Array.isArray(arr)) return { ok: false };
    return { ok: true, proposals: arr.filter((x) => x && typeof x === "object") };
  } catch (e) { return { ok: false }; }
}

/* ----------------------------------------------------------------------
   Mode switcher
---------------------------------------------------------------------- */
modeButtons.forEach((b) => {
  b.onclick = () => {
    state.mode = b.dataset.mode;
    modeButtons.forEach((x) => x.classList.toggle("active", x === b));
    render();
  };
});

function render() {
  if (state.mode === "hand") {
    if (state.hand.proposals.length) viewProposals("hand");
    else viewHand();
  } else if (state.mode === "reflect") {
    if (state.reflect.proposals.length) viewProposals("reflect");
    else viewReflect();
  } else if (state.mode === "ask") {
    viewAsk();
  } else {
    viewTheory();
  }
}

/* ----------------------------------------------------------------------
   HAND — paste hand-history text, brain proposes session + leaks.
---------------------------------------------------------------------- */
function viewHand() {
  modeTag.textContent = Bridge.standalone
    ? "standalone · no brain attached"
    : "hand · paste a hand-history export";

  const v = el("div");

  const field1 = el("div", "field");
  field1.appendChild(el("label", null, "Hand history (paste raw)"));
  const ta = el("textarea");
  ta.placeholder = "Paste a PokerStars (or similar) hand-history text export. Any plain-text hand history works.";
  ta.value = state.hand.text;
  field1.appendChild(ta);
  v.appendChild(field1);

  const row = el("div", "row");

  const dateField = el("div");
  dateField.style.minWidth = "150px";
  dateField.appendChild(el("label", null, "Date"));
  const di = document.createElement("input");
  di.type = "date"; di.value = state.hand.date;
  dateField.appendChild(di);
  row.appendChild(dateField);

  const stakesField = el("div");
  stakesField.style.flex = "1"; stakesField.style.minWidth = "180px";
  stakesField.appendChild(el("label", null, "Stakes / format (optional)"));
  const si = document.createElement("input");
  si.type = "text"; si.placeholder = "e.g. NL2, 6-max"; si.value = state.hand.stakes;
  stakesField.appendChild(si);
  row.appendChild(stakesField);

  row.appendChild(el("div", "spacer"));

  const btn = el("button", "cta", "Read this");
  btn.disabled = true;
  row.appendChild(btn);

  v.appendChild(row);

  if (Bridge.standalone) {
    const w = el("div", "panel warn");
    w.appendChild(el("h3", null, "No brain attached"));
    w.appendChild(el("p", null,
      "This app talks to a brain through the host shell. Install it into a BrainFoundry brain to use it. Standalone, nothing is proposed &mdash; the app does not fabricate."));
    v.appendChild(w);
  }

  function update() {
    state.hand.text = ta.value;
    state.hand.date = di.value || todayIso();
    state.hand.stakes = si.value;
    btn.disabled = !ta.value.trim() || Bridge.standalone;
  }
  ta.addEventListener("input", update);
  di.addEventListener("change", update);
  si.addEventListener("input", update);
  update();

  btn.onclick = async () => {
    btn.disabled = true;
    modeTag.textContent = "hand · reading — classifying the hand";
    show(el("div", "pulse", "Reading"));

    const r = await proposeFromHand();
    if (!r.ok) { viewError(r); return; }
    state.hand.proposals = normalizeProposals(r.proposals, KINDS_HAND, "episodic");
    viewProposals("hand");
  };

  show(v);
  setTimeout(() => ta.focus(), 40);
}

async function proposeFromHand() {

/* ----------------------------------------------------------------------
   ASK — grounded chat scoped to the operator's poker corpus.
---------------------------------------------------------------------- */
function viewAsk() {
  modeTag.textContent = Bridge.standalone
    ? "standalone · no brain attached"
    : "ask · grounded in your poker corpus";

  const v = el("div");

  const chat = el("div", "chat");
  for (const m of state.ask.history) chat.appendChild(renderMsg(m));
  if (state.ask.history.length === 0) {
    const p = el("div", "panel");
    p.appendChild(el("h3", null, "Ask your brain about your poker"));
    p.appendChild(el("p", null,
      "Questions are answered against your own corpus: hand histories, leaks, impressions, framework documents you have ingested. The brain cites the sources it grounds on."));
    v.appendChild(p);
  }
  v.appendChild(chat);

  const inputWrap = el("div", "chat-input");
  const ta = document.createElement("textarea");
  ta.placeholder = "Ask — e.g. 'what are my active leaks?', 'summarise my voice charter', 'where did I misplay in the March 16 session?'";
  ta.style.flex = "1";
  inputWrap.appendChild(ta);
  const btn = el("button", "cta", "Send");
  btn.disabled = true;
  inputWrap.appendChild(btn);
  v.appendChild(inputWrap);

  if (Bridge.standalone) {
    const w = el("div", "panel warn");
    w.appendChild(el("h3", null, "No brain attached"));
    w.appendChild(el("p", null, "Install this app into a BrainFoundry brain to use it."));
    v.appendChild(w);
  }

  function update() {
    btn.disabled = !ta.value.trim() || Bridge.standalone || state.ask.busy;
  }
  ta.addEventListener("input", update);
  ta.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); btn.click(); }
  });
  update();

  btn.onclick = async () => {
    const q = ta.value.trim();
    if (!q) return;
    state.ask.history.push({ who: "you", body: q });
    ta.value = ""; state.ask.busy = true; update();
    chat.appendChild(renderMsg(state.ask.history[state.ask.history.length - 1]));

    const thinking = { who: "brain", body: "thinking…", thinking: true };
    state.ask.history.push(thinking);
    const thinkingEl = renderMsg(thinking);
    chat.appendChild(thinkingEl);

    const messages = state.ask.history
      .filter((m) => !m.thinking)
      .map((m) => ({ role: m.who === "you" ? "user" : "assistant", content: m.body }));

    const res = await Bridge.call("llm.complete", { messages }, 180000);
    state.ask.history.pop();
    thinkingEl.remove();

    if (!res || !res.ok) {
      const code = (res && res.error && res.error.code) || "unknown";
      const msg = { who: "brain", body: bridgeErrorMessage(code), err: true };
      state.ask.history.push(msg);
      chat.appendChild(renderMsg(msg));
    } else {
      const r = res.result || {};
      const msg = {
        who: "brain",
        body: r.text || "(empty reply)",
        sources: Array.isArray(r.sources) ? r.sources : [],
        model: r.model || null,
        origin: "ask",
      };
      state.ask.history.push(msg);
      chat.appendChild(renderMsg(msg));
    }

    state.ask.busy = false; update();
    setTimeout(() => ta.focus(), 30);
  };

  show(v);
  setTimeout(() => ta.focus(), 40);
}

function renderMsg(m) {
  const n = el("div", "msg " + (m.who === "you" ? "you" : ""));
  n.appendChild(el("div", "who", m.who === "you" ? "you" : "your brain"));
  const body = el("div", "body");
  body.textContent = m.body;
  if (m.err) body.style.color = "var(--err-text)";
  if (m.thinking) body.style.fontStyle = "italic";
  n.appendChild(body);
  if (m.sources && m.sources.length) {
    const s = el("div", "srcs");
    s.textContent = "sources: " + m.sources.map((x) =>
      typeof x === "string" ? x : (x.document_name || x.title || "?")).join(" · ");
    n.appendChild(s);
  }
  // Keep-this affordance — only on substantive brain replies.
  if (m.who === "brain" && !m.thinking && !m.err && m.body) {
    const bar = el("div", "keep-bar");
    const btn = document.createElement("button");
    btn.textContent = "Keep this";
    btn.disabled = Bridge.standalone;
    const status = el("span", "kept", "");
    bar.appendChild(btn); bar.appendChild(status);
    n.appendChild(bar);

    btn.onclick = () => {
      if (n.querySelector(".keep-card")) return;
      btn.disabled = true;
      const card = keepCard({
        seed_title: m.title || deriveTitle(m.body),
        seed_content: m.body,
        sources: m.sources || [],
        origin: m.origin || "ask",
      }, {
        onClose: () => { card.remove(); btn.disabled = Bridge.standalone; },
        onSaved: () => {
          status.textContent = "kept in your brain";
          card.remove();
          btn.remove();
        },
      });
      n.appendChild(card);
    };
  }
  return n;
}

function deriveTitle(text) {
  const first = String(text || "").trim().split(/\n/)[0] || "";
  return first.length > 90 ? first.slice(0, 87) + "…" : first;
}

    const thinking = { who: "brain", body: "thinking…", thinking: true };
    state.theory.history.push(thinking);
    const thinkingEl = renderMsg(thinking);
    history.appendChild(thinkingEl);

    const system =
      "You are this person's brain. They have selected a poker concept they want to understand. Explain the concept clearly in flowing prose, ~150-300 words.\n\n" +
      "STRUCTURE: first the technical definition (one or two sentences), then how it shows up in actual play, then any structural isomorphism to mathematics / decision theory / probability that is real (e.g. mixed strategy is genuinely ergodic, bluff frequency is genuinely stochastic). Where the resemblance is poetic but not structural, leave it unsaid.\n\n" +
      "GROUNDING: if the operator has ingested any framework / theory / hand-history material that touches this concept, ground specific examples in it and cite. If not, fall back to general game-theory knowledge.\n\n" +
      "VOICE: no headings, no bullet lists, no code fences. Prose. Address the operator as 'you' where natural. Do not over-romanticise; name the mathematics first, the philosophy after, and only if it is true.";
    const userMsg = "Concept: " + concept.label + "\n\nExplain it.";

    const res = await Bridge.call("llm.complete", {
      messages: [
        { role: "system", content: system },
        { role: "user", content: userMsg },
      ],
    }, 180000);

    state.theory.history.pop();
    thinkingEl.remove();

    if (!res || !res.ok) {
      const code = (res && res.error && res.error.code) || "unknown";
      const msg = { who: "brain", body: bridgeErrorMessage(code), err: true };
      state.theory.history.push(msg);
      history.appendChild(renderMsg(msg));
    } else {

      const msg = {

        title: concept.label,

        sources: Array.isArray(r.sources) ? r.sources : [],
        model: r.model || null,
        origin: "theory:" + concept.id,
      };
      state.theory.history.push(msg);
      history.appendChild(renderMsg(msg));
    }

    state.theory.busy = false;
    chipNodes.forEach((cn) => { cn.disabled = Bridge.standalone; });

  show(v);

  const save = el("button", "cta small", "Keep");

  cancel.onclick = () => hooks.onClose && hooks.onClose();
  save.onclick = async () => {
    save.disabled = true; cancel.disabled = true;
    layerSel.disabled = true; kindSel.disabled = true;
    ti.disabled = true; co.disabled = true;
    status.style.color = "var(--notice-text)";
    status.textContent = "writing to your brain…";

    const content = ti.value.trim()
      ? ("# " + ti.value.trim() + "\n\n" + (co.value || ""))
      : (co.value || "");

    const metadata = {
      kind: kindSel.value,
      app: "poker-journal",
      mode: "keep",
      origin: seed.origin || "ask",
      title: ti.value,
      created: new Date().toISOString(),
    };
    if (Array.isArray(seed.sources) && seed.sources.length) {
      metadata.sources = seed.sources.map((x) =>
        typeof x === "string" ? x : (x.document_name || x.title || "?"));
    }

    const res = await Bridge.call("memory.write", {
      layer: layerSel.value, content, source: "poker-journal", metadata,
    }, 30000);

    if (res && res.ok) {
      hooks.onSaved && hooks.onSaved();
    } else {
      const code = (res && res.error && res.error.code) || "unknown";
      status.style.color = "var(--err-text)";
      status.textContent =
        code === "timeout" ? "your brain didn't answer in time"
        : code === "standalone" ? "no brain attached"

      save.disabled = false; cancel.disabled = false;
      layerSel.disabled = false; kindSel.disabled = false;
      ti.disabled = false; co.disabled = false;
    }
  };

  return card;
}

/* ----------------------------------------------------------------------
   Shared: call brain for JSON proposals, parse, return.
---------------------------------------------------------------------- */
async function callForProposals(system, userMsg) {
  const res = await Bridge.call("llm.complete", {
    messages: [
      { role: "system", content: system },
      { role: "user", content: userMsg },
    ],
  }, 240000);
  if (!res || !res.ok) {
    const code = (res && res.error && res.error.code) || "unknown";
    return { ok: false, code, message: bridgeErrorMessage(code) };
  }
  const raw = (res.result && res.result.text) || "";
  const parsed = parseProposalsJson(raw);
  if (!parsed.ok) {
    return { ok: false, code: "parse",
      message: "Your brain returned something I couldn't parse as JSON. First 240 chars: " + (raw.slice(0, 240) || "(empty)") };
  }
  return { ok: true, proposals: parsed.proposals };
}

function normalizeProposals(raw, allowedKinds, defaultLayer) {
  const out = raw.map((p, i) => ({
    id: "p" + i + "-" + Date.now(),
    layer: LAYERS.includes(p.layer) ? p.layer : defaultLayer,
    kind: allowedKinds.includes(p.kind) ? p.kind : allowedKinds[0],
    title: p.title || "(untitled)",
    content: p.content || "",
    confidence: typeof p.confidence === "number" ? p.confidence : null,
    status: "pending",
    error: null, saved_id: null, expanded: false,
  }));
  out.sort((a, b) => {
    const ac = a.confidence == null ? -1 : a.confidence;
    const bc = b.confidence == null ? -1 : b.confidence;
    return bc - ac;
  });
  return out;
}

/* ----------------------------------------------------------------------

---------------------------------------------------------------------- */
function viewProposals(mode) {
  const proposals = state[mode].proposals;
  if (!proposals.length) {
    const v = el("div");
    const p = el("div", "panel");
    p.appendChild(el("h3", null, "Nothing worth keeping"));
    p.appendChild(el("p", null,
      mode === "hand"
        ? "Your brain read the hand history and proposed zero durable entries. Either the export was too thin, or nothing structural surfaced."
        : "Your brain read the reflection and proposed zero durable entries."));
    const acts = el("div", "acts");
    const back = el("button", "cta", "Start over");
    back.onclick = () => { state[mode].proposals = []; render(); };
    acts.appendChild(back);
    p.appendChild(acts);
    v.appendChild(p);
    show(v);
    return;
  }

  modeTag.textContent = mode + " · proposals — review and approve";
  const v = el("div");

  const tb = el("div", "toolbar");
  const summary = el("div", "summary");
  tb.appendChild(summary);
  const acts = el("div", "acts");
  const approveAll = el("button", "cta small", "Approve all");
  approveAll.onclick = () => approveAllPending(mode);
  acts.appendChild(approveAll);
  const back = el("button", "cta ghost small", "Start over");
  back.onclick = () => { state[mode].proposals = []; render(); };
  acts.appendChild(back);
  tb.appendChild(acts);
  v.appendChild(tb);

  const list = el("div", "props");
  v.appendChild(list);
  for (const p of proposals) list.appendChild(propCard(p, mode));

  show(v);
  refreshSummary();

  function refreshSummary() {
    const total = proposals.length;
    const approved = proposals.filter((p) => p.status === "approved").length;
    const skipped = proposals.filter((p) => p.status === "skipped").length;
    const remaining = total - approved - skipped;
    summary.innerHTML =
      "<b>" + total + "</b> proposed &nbsp;·&nbsp; " +
      "<b>" + approved + "</b> kept &nbsp;·&nbsp; " +
      "<b>" + skipped + "</b> skipped &nbsp;·&nbsp; " +
      "<b>" + remaining + "</b> left";
    approveAll.disabled = (remaining === 0);
  }
  state._refreshSummary = refreshSummary;
}

function propCard(p, mode) {
  const card = el("div", "prop");
  card.dataset.id = p.id;
  if (p.status === "approved") card.classList.add("approved");
  if (p.status === "skipped") card.classList.add("skipped");

  const head = el("div", "head");
  const layerSel = document.createElement("select");
  for (const L of LAYERS) {
    const o = document.createElement("option");
    o.value = L; o.textContent = L;
    if (L === p.layer) o.selected = true;
    layerSel.appendChild(o);
  }
  layerSel.onchange = () => { p.layer = layerSel.value; };
  head.appendChild(layerSel);

  head.appendChild(el("div", "kind", escapeHtml(p.kind)));
  if (p.confidence != null) {
    const c = el("div", "conf");
    c.innerHTML = "confidence <b>" + (p.confidence * 100).toFixed(0) + "%</b>";
    head.appendChild(c);
  }
  card.appendChild(head);

  card.appendChild(el("div", "title", escapeHtml(p.title)));
  const body = el("div", "body" + (p.expanded ? "" : " clipped"), escapeHtml(p.content));
  card.appendChild(body);
  if (p.content && p.content.length > 240) {
    const ex = el("span", "expand", p.expanded ? "Collapse" : "Expand");
    ex.onclick = () => {
      p.expanded = !p.expanded;
      body.classList.toggle("clipped", !p.expanded);
      ex.textContent = p.expanded ? "Collapse" : "Expand";
    };
    card.appendChild(ex);
  }

  const row = el("div", "row");
  const approve = el("button", "cta small", "Approve");
  const skip = el("button", "cta ghost small", "Skip");
  const status = el("div", "status muted", "");

  approve.onclick = async () => {
    if (p.status === "approved" || p.status === "approving") return;
    p.status = "approving";
    approve.disabled = true; skip.disabled = true; layerSel.disabled = true;
    status.className = "status"; status.textContent = "writing to your brain…";
    const r = await writeProposal(p, mode);
    if (r.ok) {
      p.status = "approved"; p.saved_id = r.id;
      card.classList.add("approved");
      status.textContent = "kept in " + p.layer + " memory";
      approve.remove(); skip.remove();
    } else {
      p.status = "error"; p.error = r.message;
      status.className = "status err"; status.textContent = r.message;
      approve.disabled = false; skip.disabled = false; layerSel.disabled = false;
    }
    if (state._refreshSummary) state._refreshSummary();
  };
  skip.onclick = () => {
    if (p.status === "approved") return;
    p.status = "skipped";
    card.classList.add("skipped");
    approve.remove(); skip.remove();
    layerSel.disabled = true;
    status.className = "status muted"; status.textContent = "skipped";
    if (state._refreshSummary) state._refreshSummary();
  };

  if (p.status === "approved") { status.className = "status"; status.textContent = "kept in " + p.layer + " memory"; }
  else if (p.status === "skipped") { status.className = "status muted"; status.textContent = "skipped"; layerSel.disabled = true; }
  else { row.appendChild(approve); row.appendChild(skip); }
  row.appendChild(status);
  card.appendChild(row);
  return card;
}

async function writeProposal(p, mode) {
  const content = p.title.trim() ? ("# " + p.title.trim() + "\n\n" + (p.content || "")) : (p.content || "");
  const metadata = {
    kind: p.kind,
    app: "poker-journal",
    mode,
    confidence: p.confidence,
    title: p.title,
    created: new Date().toISOString(),
  };
  if (mode === "hand") {
    metadata.session_date = state.hand.date;
    if (state.hand.stakes) metadata.stakes = state.hand.stakes;
  }
  const res = await Bridge.call("memory.write", {
    layer: p.layer, content, source: "poker-journal", metadata,
  }, 30000);
  if (res && res.ok && res.result) return { ok: true, id: res.result.id || null };
  const code = (res && res.error && res.error.code) || "unknown";
  let msg = "couldn't save (" + code + ")";
  if (code === "timeout") msg = "your brain didn't answer in time";
  if (code === "standalone") msg = "no brain attached";
  return { ok: false, message: msg };
}

async function approveAllPending(mode) {
  for (const p of state[mode].proposals) {
    if (p.status !== "pending" && p.status !== "error") continue;
    const card = stage.querySelector('[data-id="' + p.id + '"]');
    if (!card) continue;
    const btn = card.querySelector(".cta:not(.ghost)");
    if (btn) {
      btn.click();
      await waitFor(() => p.status !== "approving", 30000);
    }
  }
}
function waitFor(fn, timeoutMs) {
  return new Promise((resolve) => {
    const t0 = Date.now();
    const tick = () => { if (fn() || Date.now() - t0 > timeoutMs) return resolve(); setTimeout(tick, 60); };
    tick();
  });
}

function viewError(result) {
  modeTag.textContent = state.mode + " · error — reading failed";
  const v = el("div");
  const p = el("div", "panel warn");
  p.appendChild(el("h3", null, "Reading failed"));
  p.appendChild(el("p", null, escapeHtml(result.message)));
  const acts = el("div", "acts");
  const back = el("button", "cta", "Back");
  back.onclick = () => render();
  acts.appendChild(back);
  p.appendChild(acts);
  v.appendChild(p);
  show(v);
}

/* ---- boot ---- */
render();
</script>
